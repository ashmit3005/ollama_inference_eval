task: code_output
dataset_path: json
dataset_kwargs:
  data_files:
    test: eval_runner/tasks/code_output/data.jsonl
output_type: generate_until
test_split: test
doc_to_text: "What does this Python code print? Reply with ONLY the exact output, no backticks, no explanation.\n\n```python\n{{code}}\n```\n\nOutput: "
doc_to_target: "{{answer}}"
generation_kwargs:
  until: ["\n"]
  max_gen_toks: 64
  temperature: 0
  do_sample: false
filter_list:
  - name: get_answer
    filter:
      - function: take_first
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
